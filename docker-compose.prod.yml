services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    volumes:
      - storage-data:/var/www/pharmacy/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/pharmacy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/pharmacy:ro
      - storage-data:/var/www/pharmacy/storage:ro

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
  storage-data:
